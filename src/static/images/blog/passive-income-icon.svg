<svg width="300" height="180" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bowlGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" />
      <stop offset="100%" style="stop-color:#10B981" />
    </linearGradient>
  </defs>

  <!-- Small bowl (investment) - LEFT SIDE -->
  <g transform="translate(30, 60)">
    <!-- Bowl shape -->
    <path d="M10 25 Q10 50 35 50 Q60 50 60 25 L60 20 Q35 15 10 20 Z"
          fill="url(#bowlGradient)"
          stroke="#4F46E5"
          stroke-width="2"/>

    <!-- Coins going IN (from above, pointing down into bowl) -->
    <g transform="translate(20, -10)">
      <ellipse cx="8" cy="4" rx="7" ry="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
      <text x="8" y="6" text-anchor="middle" font-size="7" fill="#92400E" font-weight="bold">$</text>
    </g>
    <g transform="translate(35, -5)">
      <ellipse cx="8" cy="4" rx="7" ry="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
      <text x="8" y="6" text-anchor="middle" font-size="7" fill="#92400E" font-weight="bold">$</text>
    </g>

    <!-- Arrow pointing INTO bowl (downward) -->
    <path d="M28 0 L35 15 M35 15 L31 15 M35 15 L35 10"
          stroke="#10B981"
          stroke-width="2"
          fill="none"/>

    <!-- Label -->
    <text x="35" y="75" text-anchor="middle" font-size="11" fill="#4F46E5" font-weight="bold">Investment</text>
  </g>

  <!-- Big bowl (passive income result) - RIGHT SIDE -->
  <g transform="translate(170, 40)">
    <!-- Bowl shape - bigger -->
    <path d="M10 35 Q10 80 55 80 Q100 80 100 35 L100 25 Q55 15 10 25 Z"
          fill="url(#bowlGradient)"
          stroke="#10B981"
          stroke-width="3"/>

    <!-- Coins coming OUT (from bowl, pointing upward) -->
    <g transform="translate(35, -20)">
      <ellipse cx="10" cy="5" rx="9" ry="4" fill="#10B981" stroke="#059669" stroke-width="1"/>
      <text x="10" y="8" text-anchor="middle" font-size="9" fill="white" font-weight="bold">$</text>
    </g>
    <g transform="translate(60, -35)">
      <ellipse cx="10" cy="5" rx="9" ry="4" fill="#10B981" stroke="#059669" stroke-width="1"/>
      <text x="10" y="8" text-anchor="middle" font-size="9" fill="white" font-weight="bold">$</text>
    </g>

    <!-- Arrow pointing OUT of bowl (upward) -->
    <path d="M55 25 L55 10 M55 10 L50 15 M55 10 L60 15"
          stroke="#10B981"
          stroke-width="2"
          fill="none"/>

    <!-- Label -->
    <text x="55" y="105" text-anchor="middle" font-size="12" fill="#10B981" font-weight="bold">Passive Income</text>
  </g>

  <!-- Growth arrow between bowls (left to right) -->
  <g transform="translate(100, 75)">
    <path d="M0 0 Q30 -10 60 0"
          stroke="#F59E0B"
          stroke-width="3"
          fill="none"
          stroke-dasharray="5,3"/>
    <polygon points="60 0 L52 -3 L52 4 Z" fill="#F59E0B"/>
  </g>

  <!-- Plus sign in the middle -->
  <text x="150" y="90" text-anchor="middle" font-size="28" fill="#F59E0B" font-weight="bold">+</text>
</svg>
