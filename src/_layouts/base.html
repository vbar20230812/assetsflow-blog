<!DOCTYPE html>
<html lang="{{ lang | default('he') }}" dir="{{ dir | default('rtl') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ description | default('AssetFlow Blog') }}">

  <title>{{ title | default('AssetFlow Blog') }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">

  {% block head %}{% endblock %}

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P4WS7V31DB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-P4WS7V31DB', {
      page_path: window.location.pathname,
      page_title: document.title
    });
  </script>
</head>
<body class="lang-{{ lang | default('he') }}">
  <!-- Skip Link for Accessibility -->
  <a href="#main-content" class="skip-link">דלג לתוכן הראשי</a>

  {% include "header.html" %}

  <main id="main-content" class="main-content">
    {{ content | safe }}
  </main>

  {% include "footer.html" %}

  <!-- Accessibility Toolbar -->
  {% include "accessibility-toolbar.html" %}

  <!-- JavaScript -->
  <script src="/static/js/accessibility.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
