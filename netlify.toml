# Netlify Configuration for AssetFlow Blog
# ========================================

[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

# Production context (main branch)
[context.production]
  command = "npm run build:prod"
  environment = { ELEVENTY_ENV = "production" }

# Deploy preview context (pull requests)
[context.deploy-preview]
  command = "npm run build:dev"
  environment = { ELEVENTY_ENV = "development" }

# Branch deploy context (develop branch)
[context.develop]
  command = "npm run build:dev"
  environment = { ELEVENTY_ENV = "development" }

# Branch deploys configuration
[branch-deploy]
  command = "npm run build:dev"

# Redirects
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/posts/*"
  to = "/posts/:splat/"
  status = 301

[[redirects]]
  from = "/en/posts/*"
  to = "/en/posts/:splat/"
  status = 301

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

